<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>DMX Presets</title>
   <link rel="stylesheet" href="pico.min.css">
   <link rel="stylesheet" href="dmx_controller_custom.css">
</head>

<body>
   <main class="container">
      <div class="header-flex">
         <h1 class="title-colored no-margin">DMX Controller</h1>
      </div>
      <style>
         .subtitle-row { margin: 10px; }
         .home-btn { position: relative; left: -12rem; }
         .subtitle-row h2 { margin: 1rem; }
      </style>
      <div class="subtitle-row">
         <button type="button" onclick="window.location.href='../index.html'" class="home-btn">Home</button>
         <h2>DMX Presets</h2>
      </div>
      <div class="preset-table-wrapper">
         <table class="preset-table">
            <thead>
               <tr>
                  <th>Id</th>
                  <th>Name</th>
                  <th class="edit-col">Edit</th>
                  <th>Active</th>
               </tr>
            </thead>
            <tbody id="presets-tbody">
               <!-- Rows will be generated by JavaScript -->
            </tbody>
         </table>
      </div>
      <button type="button" onclick="window.location.href='public/index.html'">Back</button>

      <script>
         async function fetchAndRenderPresets() {
            try {
               const response = await fetch('/api/v1/presets');
               const presets = await response.json();
               const tbody = document.getElementById('presets-tbody');
               tbody.innerHTML = '';
               presets.forEach((preset, i) => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                        <td>${i + 1}</td>
                        <td class="preset-name clickable-preset">${preset.name}</td>
                        <td class="edit-col">
                           <div class="edit-btn-row">
                              <button class="small-btn up-btn" title="Move Up">↑</button>
                              <button class="small-btn down-btn" title="Move Down">↓</button>
                              <button class="small-btn delete-btn" title="Delete">✕</button>
                              <button class="small-btn insert-btn" title="Insert">＋</button>
                           </div>
                        </td>
                        <td class="active-col"><div class="active-checkbox-wrapper"><input type="checkbox" class="active-checkbox" ${preset.active ? 'checked' : ''} /></div></td>
                     `;
                  tbody.appendChild(row);
                  // Up
                  row.querySelector('.up-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/move_preset_up/${i + 1}`);
                  });
                  // Down
                  row.querySelector('.down-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/move_preset_down/${i + 1}`);
                  });
                  // Delete
                  row.querySelector('.delete-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/delete_preset/${i + 1}`);
                  });
                  // Insert
                  row.querySelector('.insert-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/insert_preset_at/${i + 1}`);
                  });
                  // Preset name click: open edit page with number and name
                  row.querySelector('.preset-name').addEventListener('click', () => {
                     window.location.href = `edit_preset.html?number=${i + 1}&name=${encodeURIComponent(preset.name)}`;
                  });
                  // Active checkbox
                  row.querySelector('.active-checkbox').addEventListener('change', async (e) => {
                     const checked = e.target.checked ? 1 : 0;
                     await sendPresetAction(`/api/v1/swap_preset_activation/${i + 1}/${checked}`);
                  });
               });
            } catch (err) {
               console.error('Failed to load presets:', err);
            }
         }

         async function sendPresetAction(url) {
            try {
               let method = 'PUT';
               if (url.startsWith('/api/v1/delete_preset/')) method = 'DELETE';
               const response = await fetch(url, { method });
               if (!response.ok) throw new Error('Request failed');
               // Always expect the updated preset list as response
               const presets = await response.json();
               const tbody = document.getElementById('presets-tbody');
               tbody.innerHTML = '';
               presets.forEach((preset, i) => {
                  const row = document.createElement('tr');
                  row.innerHTML = `
                        <td>${i + 1}</td>
                        <td class="preset-name">${preset.name}</td>
                        <td class="edit-col">
                          <div class="edit-btn-row">
                            <button class="small-btn up-btn" title="Move Up">↑</button>
                            <button class="small-btn down-btn" title="Move Down">↓</button>
                            <button class="small-btn delete-btn" title="Delete">✕</button>
                            <button class="small-btn insert-btn" title="Insert">＋</button>
                          </div>
                        </td>
                        <td class="active-col"><div class="active-checkbox-wrapper"><input type="checkbox" class="active-checkbox" ${preset.active ? 'checked' : ''} /></div></td>
                     `;
                  tbody.appendChild(row);
                  // Re-attach listeners for new rows
                  row.querySelector('.up-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/move_preset_up/${i + 1}`);
                  });
                  row.querySelector('.down-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/move_preset_down/${i + 1}`);
                  });
                  row.querySelector('.delete-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/delete_preset/${i + 1}`);
                  });
                  row.querySelector('.insert-btn').addEventListener('click', async () => {
                     await sendPresetAction(`/api/v1/insert_preset_at/${i + 1}`);
                  });
                  row.querySelector('.active-checkbox').addEventListener('change', async (e) => {
                     const checked = e.target.checked ? 1 : 0;
                     await sendPresetAction(`/api/v1/swap_preset_activation/${i + 1}/${checked}`);
                  });
               });
            } catch (err) {
               console.error('Action failed:', err);
            }
         }

         window.addEventListener('DOMContentLoaded', fetchAndRenderPresets);
      </script>
   </main>
</body>

</html>
