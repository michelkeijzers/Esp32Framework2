<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Logging</title>
   <link rel="stylesheet" href="pico.min.css">
   <link rel="stylesheet" href="custom.css">
   <style>
      .subtitle-row h2 { margin: 0; }
   </style>
</head>

<body>
   <main class="container">
      <div class="header-flex">
         <h1 class="title-colored no-margin">DMX Controller</h1>
      </div>
      <div class="subtitle-row">
         <button type="button" onclick="window.location.href='../index.html'" class="home-btn">Home</button>
         <h2>Logging</h2>
      </div>
      <style>
         #logbox {
            width: 100%;
            font-family: monospace;
            font-size: 1em;
            resize: vertical;
         }
         .logbox-container {
            margin-top: 2em;
         }
      </style>
      <div class="logbox-container">
         <textarea id="logbox" rows="20" readonly></textarea>
      </div>
   </main>
   <script>
      let eventSource = null;
      function appendLog(line) {
         const logbox = document.getElementById('logbox');
         logbox.value += line + '\n';
         logbox.scrollTop = logbox.scrollHeight;
      }
      function startLogStream() {
         eventSource = new EventSource('/api/v1/logging');
         eventSource.onmessage = function (e) {
            appendLog(e.data);
         };
         eventSource.onerror = function () {
            appendLog('[Connection lost]');
            eventSource.close();
         };
      }
      window.addEventListener('DOMContentLoaded', startLogStream);
      window.addEventListener('beforeunload', function () {
         if (eventSource) eventSource.close();
      });
   </script>
</body>

</html>
