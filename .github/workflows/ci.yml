name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  prepare-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CI container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          tags: esp32framework2-ci:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export CI image tarball
        run: docker save esp32framework2-ci:latest -o esp32framework2-ci.tar

      - name: Upload CI image artifact
        uses: actions/upload-artifact@v5
        with:
          name: ci-image
          path: esp32framework2-ci.tar
          if-no-files-found: error

  lint-format:
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Run clang-format (C++)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -c 'find main tests -type f \( -name "*.cpp" -o -name "*.hpp" \) | xargs -r clang-format -n --Werror'

      - name: Run Prettier (JS/Markdown/CSS)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -c 'prettier --check "**/*.{js,ts,css,scss,md,json,html}"'

  static-analysis:
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Configure host tests for compile database
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -lc '
            set -e
            cmake -S tests -B /tmp/esp32framework2-tests-build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          '

      - name: Run clang-tidy (production C++)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -lc '
            set -e
            COMPILE_DB=/tmp/esp32framework2-tests-build/compile_commands.json

            if [ ! -f "$COMPILE_DB" ]; then
              echo "compile_commands.json not found at $COMPILE_DB"
              exit 1
            fi

            grep -o '"file": "[^"]*"' "$COMPILE_DB" \
              | sed 's/"file": "//; s/"$//' \
              | grep '^/workspace/main/.*\\.cpp$' \
              | sort -u > /tmp/clang_tidy_files.txt

            if [ ! -s /tmp/clang_tidy_files.txt ]; then
              echo "No production source files found for clang-tidy"
              exit 1
            fi

            xargs -a /tmp/clang_tidy_files.txt clang-tidy -p /tmp/esp32framework2-tests-build --warnings-as-errors=* --quiet
          '

  website:
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: main/project_dmx_controller/website/node_modules
          key: npm-${{ hashFiles('main/project_dmx_controller/website/package-lock.json') }}
          restore-keys: |
            npm-

      - name: Install npm dependencies
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace/main/project_dmx_controller/website esp32framework2-ci bash -c 'npm ci --include=optional --no-audit --no-fund'

      - name: Run Prettier (website)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace/main/project_dmx_controller/website esp32framework2-ci bash -c 'npm run format:check'

      - name: Build website
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace/main/project_dmx_controller/website esp32framework2-ci bash -c 'npm run build'

      - name: Test website
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace/main/project_dmx_controller/website esp32framework2-ci bash -c 'npm test'

  build:
    runs-on: ubuntu-latest
    needs: prepare-image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Run ESP-IDF build only
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -lc '
            set -e

            if [ -f /opt/esp/idf/export.sh ]; then
              . /opt/esp/idf/export.sh > /dev/null 2>&1
            elif [ -f /opt/esp/esp-idf-v6/export.sh ]; then
              . /opt/esp/esp-idf-v6/export.sh > /dev/null 2>&1
            elif [ -n "$IDF_PATH" ] && [ -f "$IDF_PATH/export.sh" ]; then
              . "$IDF_PATH/export.sh" > /dev/null 2>&1
            else
              echo "ESP-IDF export.sh not found"
              exit 1
            fi

            rm -rf /workspace/build

            echo "========== BUILD =========="
            idf.py -DBUILD_HOST_TESTS_WITH_MAIN=OFF -DBUILD_HOST_COVERAGE_WITH_MAIN=OFF reconfigure
            idf.py -DBUILD_HOST_TESTS_WITH_MAIN=OFF -DBUILD_HOST_COVERAGE_WITH_MAIN=OFF build
          '

  unit-tests:
    runs-on: ubuntu-latest
    needs:
      - prepare-image
      - build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Run host unit tests
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -lc '
            set -e
            HOST_TEST_BUILD_DIR=/tmp/esp32framework2-tests-build

            cmake -E rm -rf \
              ${HOST_TEST_BUILD_DIR}/CMakeFiles/3.30.2 \
              ${HOST_TEST_BUILD_DIR}/_deps/googletest-subbuild/CMakeFiles/3.30.2
            cmake -S tests -B ${HOST_TEST_BUILD_DIR}
            cmake --build ${HOST_TEST_BUILD_DIR} --config Release --parallel "$(nproc)"

            echo "========== UNIT TESTS =========="
            ctest --test-dir ${HOST_TEST_BUILD_DIR} -C Release -N -E "IntegrationTest|AppMainIntegrationTest"
            ctest --test-dir ${HOST_TEST_BUILD_DIR} -C Release --output-on-failure --progress --timeout 120 -j "$(nproc)" -E "IntegrationTest|AppMainIntegrationTest"
          '

  integration-tests:
    runs-on: ubuntu-latest
    needs:
      - prepare-image
      - build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Run host integration tests
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -lc '
            set -e
            HOST_TEST_BUILD_DIR=/tmp/esp32framework2-tests-build

            cmake -E rm -rf \
              ${HOST_TEST_BUILD_DIR}/CMakeFiles/3.30.2 \
              ${HOST_TEST_BUILD_DIR}/_deps/googletest-subbuild/CMakeFiles/3.30.2
            cmake -S tests -B ${HOST_TEST_BUILD_DIR}
            cmake --build ${HOST_TEST_BUILD_DIR} --config Release --parallel "$(nproc)"

            echo "========== INTEGRATION TESTS =========="
            ctest --test-dir ${HOST_TEST_BUILD_DIR} -C Release -N -R "IntegrationTest|AppMainIntegrationTest"
            ctest --test-dir ${HOST_TEST_BUILD_DIR} -C Release --output-on-failure --progress --timeout 120 -j "$(nproc)" -R "IntegrationTest|AppMainIntegrationTest"
          '

  coverage:
    runs-on: ubuntu-latest
    needs:
      - prepare-image
      - build
      - unit-tests
      - integration-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download CI image artifact
        uses: actions/download-artifact@v5
        with:
          name: ci-image

      - name: Load CI container image
        run: docker load -i esp32framework2-ci.tar

      - name: Generate host coverage
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace -w /workspace esp32framework2-ci bash -lc '
            set -e

            echo "========== COVERAGE: BUILD & RUN =========="
            cmake -E rm -rf \
              tests/build/CMakeFiles/3.30.2 \
              tests/build/_deps/googletest-subbuild/CMakeFiles/3.30.2
            cmake -S tests -B tests/build -DCMAKE_BUILD_TYPE=Debug -DENABLE_GCOV=ON
            cmake --build tests/build --target unit_tests --parallel "$(nproc)"
            cmake --build tests/build --target integration_tests --parallel "$(nproc)"
            cmake \
              -DGCOVR_EXE=/usr/bin/gcovr \
              -DSOURCE_ROOT=/workspace \
              -DCTEST_PARALLEL_LEVEL="$(nproc)" \
              -DTEST_BUILD_DIR=/workspace/tests/build \
              -P /workspace/tests/cmake/RunGcovr.cmake

            echo "========== COVERAGE OUTPUT =========="
            [ -f tests/build/coverage_html/index.html ] && echo "HTML report: tests/build/coverage_html/index.html" || echo "HTML report not found at tests/build/coverage_html/index.html"
            [ -f tests/build/coverage.xml ] && echo "Cobertura XML: tests/build/coverage.xml" || echo "Cobertura XML not found at tests/build/coverage.xml"
          '

      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-html
          path: tests/build/coverage_html/**
          if-no-files-found: warn

      - name: Upload coverage XML artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: tests/build/coverage.xml
          if-no-files-found: warn
